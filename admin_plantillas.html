<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administrar Plantillas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="formulario.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.2/tinymce.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

</head>

<body>

<button class="theme-toggle" id="themeToggle">
  Oscuro
</button>

<div class="container-fluid py-4" style="max-width:1400px; margin:0 auto;">

<div class="card shadow-lg mb-4">
<div class="card-body">

<div class="d-flex justify-content-between align-items-center mb-4">
<h2>Gestionar Plantillas</h2>
<button class="btn btn-success" onclick="abrirFormularioNueva()">
Crear Plantilla
</button>
</div>

<div id="alertaContainer"></div>

<div id="tablaPantillas" style="display:block;">
<table class="table table-striped">
<thead>
<tr>
<th>Codigo</th>
<th>Nombre</th>
<th>Descripcion</th>
<th>Tipo</th>
<th>Tabla Origen</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="cuerpoTabla">
</tbody>
</table>
</div>

<div id="formularioSection" style="display:none;">
<h4 id="tituloFormulario">Nueva Plantilla</h4>

<div class="row mb-3">
<div class="col-md-6">
<label class="form-label fw-bold" style="font-size: 1.05rem;">Codigo Plantilla</label>
<input type="text" id="cod_plantilla" class="form-control" placeholder="Ej: presupuesto_1">
</div>
<div class="col-md-6">
<label class="form-label fw-bold" style="font-size: 1.05rem;">Nombre</label>
<input type="text" id="nombre" class="form-control" placeholder="Ej: Presupuesto Estandar">
</div>
</div>

<div class="row mb-3">
<div class="col-md-6">
<label class="form-label fw-bold" style="font-size: 1.05rem;">Descripcion</label>
<input type="text" id="descripcion" class="form-control" placeholder="">
</div>
<div class="col-md-6">
<label class="form-label fw-bold" style="font-size: 1.05rem;">Tipo de Documento</label>
<input type="text" id="tipo_documento" class="form-control" placeholder="Ej: presupuesto">
</div>
</div>

<div class="mb-3">
<label class="form-label fw-bold" style="font-size: 1.05rem;">HTML Plantilla</label>
<div class="row">
<div class="col-md-6">
<label class="form-label" style="font-size: 0.9rem; color: #667eea; font-weight: 600;">Editor Texto (HTML)</label>
<textarea id="contenido" class="form-control" rows="15" placeholder="Pegue el HTML con variables entre guiones -variable-"></textarea>
</div>
<div class="col-md-6">
<label class="form-label" style="font-size: 0.9rem; color: #667eea; font-weight: 600;">Editor Visual (Vista Previa)</label>
<textarea id="previsualizacion" style="width: 100%;"></textarea>
</div>
</div>
</div>

<div class="mb-3">
<label class="form-label fw-bold" style="font-size: 1.05rem;">
<input type="checkbox" id="estado" checked> Plantilla Activa
</label>
</div>

<div>
<button class="btn btn-primary" onclick="guardarPlantilla()">
Guardar
</button>
<button class="btn btn-secondary" onclick="cancelarFormulario()">
Cancelar
</button>
</div>

</div>

</div>
</div>

<button class="btn btn-light" onclick="history.back()">
Volver
</button>

</div>

<script src="admin_plantillas.js"></script>
<script src="temaoscuro.js"></script>

</body>
</html>
