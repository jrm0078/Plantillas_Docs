<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generador de Documentos</title>

<link rel="icon" href="about:blank">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />
<link href="formulario.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.2/tinymce.min.js"></script>
<script src="tinymce_es.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>


<body>

<button class="theme-toggle" id="themeToggle">
  <i class="fas fa-moon"></i> Oscuro
</button>

<div class="container-fluid py-4" style="max-width:1400px; margin:0 auto;">

<div class="card shadow-lg mb-4">
<div class="card-body">
<div class="form-header">
<h2> Generador de Documentos</h2>
</div>

<div class="section-card">
<h5> 1. Seleccionar Plantilla</h5>
<div class="row">
<div class="col-md-8">
<label class="form-label fw-bold">Plantilla</label>
<select id="selectPlantilla" class="form-select form-select-lg" onchange="cargarPlantilla()">
<option value="">-- Seleccionar una plantilla --</option>
</select>
</div>
<div class="col-md-4">
<div class="d-grid gap-2" style="display: grid; grid-template-columns: 1fr 1fr;">
<button class="btn btn-limpiar mt-4" onclick="limpiar()">
Limpiar
</button>
<button class="btn btn-administrar mt-4" onclick="window.location.href='admin_plantillas.html'">
Administrar
</button>
</div>
</div>
</div>
</div>

<div class="section-card" id="filtroSection" style="display:none;">
<h5>2. Seleccionar Cliente</h5>
<div class="row">
<div class="col-md-8">
<label class="form-label fw-bold">Cliente</label>
<select id="selectCliente" class="form-select form-select-lg">
<option value="">-- Seleccionar cliente --</option>
</select>
</div>
<div class="col-md-4">
<button class="btn btn-primary mt-4" onclick="aplicarFiltro()">
Cargar Documento
</button>
</div>
</div>
</div>

<div class="section-card" id="formularioSection" style="display:none;">
<h5>3. Completar Campos del Documento</h5>
<div id="formularioDinamico"></div>
<div class="mt-3">
<button class="btn btn-primary" onclick="generarDocumento()">
Actualizar Documento
</button>
</div>
</div>

<div class="section-card" id="editorSection" style="display:none;">
<h5>3. Editor de Documento</h5>
<textarea id="documento-editor"></textarea>
</div>


<div class="card shadow-lg">
<div class="card-body">
<div class="d-flex gap-2 justify-content-center flex-wrap">
<button class="btn btn-descargar px-4" onclick="descargarPDF()">
<i class="fas fa-file-pdf"></i> Descargar PDF
</button>

<button class="btn btn-imprimir px-4" onclick="imprimirDocumento()">
<i class="fas fa-print"></i> Imprimir
</button>

<button class="btn btn-success px-4" onclick="guardarDocumento()">
<i class="fas fa-save"></i> Guardar
</button>

<button class="btn btn-light px-4" onclick="history.back()">
Volver
</button>
</div>
</div>
</div>

</div>

<script src="plantillas.js"></script>
<script src="temaoscuro.js"></script>

</body>
</html>
