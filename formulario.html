<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generador de Documentos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<!-- TinyMCE Editor - Versión libre -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.2/tinymce.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
background:#283fa7;
min-height:100vh;
padding:30px 15px;
}

.form-header{
text-align:center;
margin-bottom:30px;
border-bottom:3px solid #667eea;
padding-bottom:20px;
}

.form-header h2{
color:#333;
font-weight:700;
}

.section-card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.section-card h5{
color:#667eea;
margin-bottom:15px;
padding-bottom:10px;
border-bottom:2px solid #667eea;
}

.btn-descargar{
background:#03b42a;
border:none;
color:white;
font-weight:600;
}

.btn-descargar:hover{
background:#098023;
color:white;
}

.btn-imprimir{
background:#0066cc;
border:none;
color:white;
font-weight:600;
}

.btn-imprimir:hover{
background:#0052a3;
color:white;
}

.btn-nuevo{
background:#667eea;
border:none;
color:white;
font-weight:600;
}

.btn-nuevo:hover{
background:#5568d3;
color:white;
}

.campo-dinamico{
margin-bottom:15px;
}

.campo-dinamico label{
font-weight:600;
color:#333;
margin-bottom:5px;
display:block;
}

.campo-dinamico input,
.campo-dinamico textarea,
.campo-dinamico select{
width:100%;
padding:8px 12px;
border:1px solid #ddd;
border-radius:4px;
font-size:0.95rem;
}

.campo-dinamico textarea{
min-height:80px;
resize:vertical;
}

.badge-requerido{
background:#dc3545;
color:white;
font-size:0.75rem;
margin-left:5px;
}

#documento-editor{
min-height:500px;
background:white;
border:1px solid #e0e0e0;
border-radius:8px;
}

.tox-tinymce{
border:1px solid #e0e0e0 !important;
border-radius:8px !important;
}

.alert-info-custom{
background:#e7f3ff;
border-left:4px solid #0066cc;
padding:15px;
border-radius:4px;
margin-bottom:15px;
}

</style>
</head>


<body>

<div class="container-fluid py-4" style="max-width:1400px; margin:0 auto;">

<div class="card shadow-lg mb-4">
<div class="card-body">
<div class="form-header">
<h2> Generador de Documentos</h2>
</div>

<div class="section-card">
<h5> 1. Seleccionar Plantilla</h5>
<div class="row">
<div class="col-md-8">
<label class="form-label fw-bold">Plantilla</label>
<select id="selectPlantilla" class="form-select form-select-lg" onchange="cargarPlantilla()">
<option value="">-- Seleccionar una plantilla --</option>
</select>
</div>
<div class="col-md-4">
<button class="btn btn-nuevo mt-4" onclick="nuevoDocumento()">
<i class="fas fa-file"></i> Nuevo Documento
</button>
</div>
</div>
</div>

<!-- FORMULARIO DINÁMICO -->
<div class="section-card" id="formularioSection" style="display:none;">
<h5><i class="fas fa-edit"></i> 2. Completar Campos del Documento</h5>
<div id="formularioDinamico"></div>
<div class="mt-3">
<button class="btn btn-primary" onclick="generarDocumento()">
<i class="fas fa-refresh"></i> Actualizar Documento
</button>
</div>
</div>

<!-- EDITOR DE DOCUMENTO -->
<div class="section-card" id="editorSection" style="display:none;">
<h5><i class="fas fa-document"></i> 2. Editor de Documento</h5>
<textarea id="documento-editor"></textarea>
</div>

<!-- ACCIONES -->
<div class="card shadow-lg">
<div class="card-body">
<div class="d-flex gap-2 justify-content-center flex-wrap">
<button class="btn btn-descargar px-4" onclick="descargarPDF()">
<i class="fas fa-file-pdf"></i> Descargar PDF
</button>

<button class="btn btn-imprimir px-4" onclick="imprimirDocumento()">
<i class="fas fa-print"></i> Imprimir
</button>

<button class="btn btn-dark px-4" onclick="copiarAlPortapapeles()" style="background:#666; border:none; color:white; font-weight:600;">
<i class="fas fa-copy"></i> Copiar
</button>

<button class="btn btn-success px-4" onclick="guardarDocumento()">
<i class="fas fa-save"></i> Guardar
</button>

<button class="btn btn-light px-4" onclick="window.location.href='index.html'">
<i class="fas fa-arrow-left"></i> Volver
</button>
</div>
</div>
</div>

</div>

<script src="App_plantillas.js"></script>

</body>
</html>
