<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generador de Documentos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<!-- TinyMCE Editor -->
<script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/6/tinymce.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
background:#283fa7;
min-height:100vh;
padding:30px 15px;
}

.form-header{
text-align:center;
margin-bottom:30px;
border-bottom:3px solid #667eea;
padding-bottom:20px;
}

.form-header h2{
color:#333;
font-weight:700;
}

.selector-presupuesto{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.selector-presupuesto select{
border:2px solid #667eea;
color:#333;
}

.btn-descargar{
background:#03b42a;
border:none;
color:white;
font-weight:600;
}

.btn-descargar:hover{
background:#098023;
color:white;
}

.btn-imprimir{
background:#0066cc;
border:none;
color:white;
font-weight:600;
}

.btn-imprimir:hover{
background:#0052a3;
color:white;
}

.btn-nuevo{
background:#667eea;
border:none;
color:white;
font-weight:600;
}

.btn-nuevo:hover{
background:#5568d3;
color:white;
}

#documento-editor{
min-height:500px;
background:white;
border:1px solid #e0e0e0;
border-radius:8px;
}

.tox-tinymce{
border:1px solid #e0e0e0 !important;
border-radius:8px !important;
}

.doc-header{
border-bottom:2px solid #667eea;
margin-bottom:20px;
padding-bottom:15px;
}

.doc-title{
font-size:1.8rem;
font-weight:700;
color:#333;
margin-bottom:5px;
}

.doc-subtitle{
color:#666;
font-size:0.9rem;
}

.form-section{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.form-section h5{
color:#667eea;
margin-bottom:15px;
padding-bottom:10px;
border-bottom:2px solid #667eea;
}

.alert-info-custom{
background:#e7f3ff;
border-left:4px solid #0066cc;
padding:15px;
border-radius:4px;
margin-bottom:15px;
}

.spinner-loading{
display:none;
}

</style>
</head>


<body>

<div class="container-fluid py-4" style="max-width:1400px; margin:0 auto;">

<!-- SELECTOR DE PRESUPUESTOS -->
<div class="card shadow-lg mb-4">
<div class="card-body">
<div class="form-header">
<h2><i class="fas fa-file-invoice"></i> Generador de Documentos</h2>
</div>

<div class="selector-presupuesto">
<div class="row align-items-end">
<div class="col-md-8">
<label class="form-label fw-bold">Seleccionar Presupuesto</label>
<select id="selectPresupuesto" class="form-select form-select-lg" onchange="cargarPresupuesto()">
<option value="">-- Seleccionar un presupuesto --</option>
</select>
<small class="text-muted d-block mt-2">Se cargarán automáticamente los datos del presupuesto seleccionado</small>
</div>
<div class="col-md-4 text-end">
<button class="btn btn-nuevo me-2" onclick="nuevoPresupuesto()">
<i class="fas fa-plus"></i> Nuevo Presupuesto
</button>
<button class="btn btn-light" onclick="window.location.href='index.html'">
<i class="fas fa-arrow-left"></i> Volver
</button>
</div>
</div>
</div>

</div>
</div>

<!-- FORMULARIO DE DATOS -->
<div class="card shadow-lg mb-4">
<div class="card-header bg-light">
<h5 class="mb-0"><i class="fas fa-edit"></i> Datos del Presupuesto</h5>
</div>
<div class="card-body">

<div id="formulario">
<div class="row">
<div class="col-md-6 mb-3">
<label class="form-label fw-bold">Cliente</label>
<input type="text" id="cliente" class="form-control" placeholder="Nombre del cliente">
</div>

<div class="col-md-6 mb-3">
<label class="form-label fw-bold">Número de Presupuesto</label>
<input type="text" id="numPresupuesto" class="form-control" placeholder="PRE-001">
</div>
</div>

<div class="row">
<div class="col-md-6 mb-3">
<label class="form-label fw-bold">Fecha</label>
<input type="date" id="fecha" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label class="form-label fw-bold">Validez (días)</label>
<input type="number" id="validez" class="form-control" value="30">
</div>
</div>

<div class="mb-3">
<label class="form-label fw-bold">Descripción del Servicio</label>
<textarea id="descripcion" class="form-control" rows="3" placeholder="Detalle el servicio o producto..."></textarea>
</div>

<div class="row">
<div class="col-md-4 mb-3">
<label class="form-label fw-bold">Cantidad</label>
<input type="number" id="cantidad" class="form-control" value="1">
</div>

<div class="col-md-4 mb-3">
<label class="form-label fw-bold">Precio Unitario (€)</label>
<input type="number" id="precioUnitario" class="form-control" placeholder="0.00" step="0.01">
</div>

<div class="col-md-4 mb-3">
<label class="form-label fw-bold">Descuento (%)</label>
<input type="number" id="descuento" class="form-control" value="0">
</div>
</div>

<div class="d-flex gap-2 justify-content-center flex-wrap mt-3">
<button class="btn btn-primary" onclick="guardarPresupuesto()">
<i class="fas fa-save"></i> Guardar Cambios
</button>
</div>
</div>

</div>
</div>

<!-- EDITOR DE DOCUMENTO -->
<div class="card shadow-lg mb-4">
<div class="card-header bg-light">
<h5 class="mb-0"><i class="fas fa-document"></i> Editor de Documento (Editable)</h5>
</div>
<div class="card-body p-0">
<textarea id="documento-editor" class="form-control" style="border:0; border-radius:0;"></textarea>
</div>
</div>

<!-- BOTONES DE ACCIONES -->
<div class="card shadow-lg mb-4">
<div class="card-body">
<div class="d-flex gap-2 justify-content-center flex-wrap">
<button class="btn btn-descargar px-4" onclick="descargarPDF()">
<i class="fas fa-file-pdf"></i> Descargar PDF
</button>

<button class="btn btn-imprimir px-4" onclick="imprimirDocumento()">
<i class="fas fa-print"></i> Imprimir
</button>

<button class="btn btn-darkpx-4" onclick="copiarAlPortapapeles()" style="background:#666; border:none; color:white; font-weight:600;">
<i class="fas fa-copy"></i> Copiar al Portapapeles
</button>
</div>
</div>
</div>

</div>

<script src="App.js"></script>

</body>
</html>
