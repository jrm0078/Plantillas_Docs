<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Formulario</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
background:#283fa7;
min-height:100vh;
padding:30px 15px;
}

.form-header{
text-align:center;
margin-bottom:30px;
border-bottom:3px solid #667eea;
padding-bottom:20px;
}

.form-header h2{
color:#333;
font-weight:700;
}

.btn-descargar{
background:#03b42a;
border:none;
color:white;
font-weight:600;
}

.btn-descargar:hover{
background:#098023;
color:white;
}

#documento{
min-height:400px;
background:white;
padding:30px;
border:1px solid #e0e0e0;
border-radius:8px;
line-height:1.8;
font-size:0.95rem;
}

.doc-header{
border-bottom:2px solid #667eea;
margin-bottom:20px;
padding-bottom:15px;
}

.doc-title{
font-size:1.8rem;
font-weight:700;
color:#333;
margin-bottom:5px;
}

.doc-subtitle{
color:#666;
font-size:0.9rem;
}

.doc-row{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
margin-bottom:20px;
}

.doc-field{
margin-bottom:15px;
}

.doc-label{
font-weight:600;
color:#667eea;
font-size:0.85rem;
text-transform:uppercase;
margin-bottom:3px;
}

.doc-value{
color:#333;
font-size:0.95rem;
}

</style>
</head>


<body>

<div class="container py-4" style="max-width:1200px;">

<div class="card shadow-lg mb-4">

<div class="card-body">

<div class="form-header">
<h2 id="titulo"></h2>
</div>

<div id="formulario"></div>

<div class="d-flex gap-2 justify-content-center flex-wrap mt-4">

<button class="btn btn-descargar px-4" onclick="descargarPDF()">
Descargar PDF
</button>

<button class="btn btn-light px-4" onclick="window.location.href='index.html'">
Volver
</button>

</div>

</div>
</div>


<div class="card shadow-lg">

<div class="card-header bg-light">
<h5 class="mb-0">Vista Previa del Documento</h5>
</div>

<div class="card-body p-0">

<div id="documento" contenteditable="true" class="p-4"></div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
