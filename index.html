<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Plantillas Profesionales</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body {
    background-color: #283fa7; 
    min-height: 100vh;
    padding: 40px 20px;
  }

  .header {
    text-align: center;
    color: white;
    margin-bottom: 50px;
  }

  .header h1 {
    font-weight: 700;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
  }

  .card {
    transition: all 0.3s ease;
    border: none;
    height: 100%;
  }

  .card:hover {
    transform: translateY(-8px);
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3) !important;
  }

  .card-icon {
    font-size: 2.5rem;
    text-align: center;
    padding: 20px 0;
    background-color: #0c2697; 
    color: white;
  }

  .btn-plantilla {
    background-color: #0c2697; 
    border: none;
    color: white;
    font-weight: 600;
    transition: all 0.3s ease;
  }

  .btn-plantilla:hover {
    background-color: #0c2697; 
    color: white;
    transform: scale(1.02);
  }
</style>
</head>

<body>
<div class="container">
  <div class="header">
    <h1 class="fs-1">Plantillas para documentos</h1>
  </div>

    <div class="col-md-6 col-lg-4">
      <div class="card shadow-sm">
        <div class="card-icon"></div>
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">Presupuestos</h5>
          <p class="card-text flex-grow-1">Presupuesto para clientes</p>
          <button class="btn btn-plantilla w-100" onclick="seleccionarPlantilla('presupuesto')">
            Crear Presupuesto
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
function seleccionarPlantilla(tipo){
  localStorage.setItem("plantilla", tipo);
  window.location.href = "formulario.html";
}
</script>

</body>
</html>
